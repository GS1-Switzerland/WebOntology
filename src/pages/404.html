<!DOCTYPE html>
<html>
<head>
  <script>
    // Pfad extrahieren: z.B. /mein-term → term=mein-term
    const path = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
    if (path && /^[A-Za-z0-9_-]+$/.test(path)) {
      // Zur index.html weiterleiten mit dem term als Query-Parameter
      window.location.replace('/?search=' + path);
    }
  </script>
</head>
<body></body>
</html>
